name: Sensor CI Pipeline

on:
  push:
    branches: [main]

jobs:
  run-sensor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Sensor Simulation
        run: |
          timeout 5s python3 sensor.pyname: Sensor CI Pipeline

